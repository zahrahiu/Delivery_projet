spring.application.name=parcel-service

# Producer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


# Database
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Eureka
eureka.instance.instance-id=${spring.application.name}:${server.port}
spring.cloud.bootstrap.enabled=true
spring.cloud.config.fail-fast=false
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://configuration-service:9999

# Zipkin & Monitoring
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
management.tracing.sampling.probability=1.0
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.prometheus.metrics.export.enabled=true
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always

# ??? Kafka Configuration - ????????? ?????? ???
spring.kafka.bootstrap-servers=kafka:9092

# Consumer Configuration - ?????? JsonDeserializer
spring.kafka.consumer.group-id=parcel-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=java.util.Map


# Other
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.consumer.auto-startup=true


