server.port=8888
spring.application.name=gateway-service

# Eureka
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# Enable Discovery
spring.cloud.discovery.enabled=true

rsa.public-key=classpath:keys/publicKey.pem

# Routes
spring.cloud.gateway.routes[0].id=users-service
spring.cloud.gateway.routes[0].uri=lb://users-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/users-service/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[1].id=security-service
spring.cloud.gateway.routes[1].uri=lb://security-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/service-security/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[2].id=notification-service
spring.cloud.gateway.routes[2].uri=lb://notification-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/notification-service/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[3].id=tracking-service
spring.cloud.gateway.routes[3].uri=lb://tracking-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/tracking-service/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

# ? ??? ??? route
spring.cloud.gateway.routes[4].id=tarif-zone-service
spring.cloud.gateway.routes[4].uri=lb://tarif-zone-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/tarif-zone-service/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1


eureka.instance.instance-id=${spring.application.name}:${server.port}

#
rsa.private-key=classpath:keys/privateKey.pem

# Dynamic Routing Settings
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# ??? ???? Zipkin ?? Kubernetes
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

# ???? ???? ??????? ????? ????? (1.0 ???? 100%? ?????? ???????)
management.tracing.sampling.probability=1.0

# ??? ????????? ?????? ?? ??? Logs (??????? ???? ?????)
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# expose ??? ??? endpoints ?????????
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# ??????? ??????? ?? Spring Boot 3 (????? .enabled ?????? ?? .step)
management.prometheus.metrics.export.enabled=true

# ??? ???? ???????? ????? (???? ?? Grafana)
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always
