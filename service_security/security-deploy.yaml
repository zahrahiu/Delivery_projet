apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: security-service
  template:
    metadata:
      labels:
        app: security-service
    spec:
      containers:
        - name: security-service
          image: security-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            # Basic Configuration
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: SPRING_APPLICATION_NAME
              value: "security-service"
            - name: SERVER_PORT
              value: "8080"

            # Database Configuration (Critical for the "Relation roles does not exist" error)
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-service:5432/delivery_db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "zahra123"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: SPRING_JPA_SHOW_SQL
              value: "true"

            # Eureka Configuration
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-service:8761/eureka/"
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: "security-service"

            # Config Server (Disabled to avoid startup conflicts)
            - name: SPRING_CLOUD_CONFIG_ENABLED
              value: "false"

          # Health Checks (Readiness & Liveness)
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10

          resources:
            limits:
              memory: "1Gi"
              cpu: "1000m"
            requests:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: security-service
spec:
  selector:
    app: security-service
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP